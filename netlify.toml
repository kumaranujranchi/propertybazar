[build]
  publish = "."
  command = "npx convex deploy --cmd \"npm run build\""

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[edge_functions]]
  path = "/property-detail.html"
  function = "og"

[[redirects]]
  from = "http://www.24dismil.com/*"
  to = "https://24dismil.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.24dismil.com/*"
  to = "https://24dismil.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://24dismil.com/*"
  to = "https://24dismil.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "https://compassionate-mockingbird-459.convex.site/sitemap.xml"
  status = 200
